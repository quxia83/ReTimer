<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#43A047"/>
    </linearGradient>
    <linearGradient id="yellow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFCA28"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EF5350"/>
      <stop offset="100%" stop-color="#E53935"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <!-- Track -->
  <circle cx="512" cy="512" r="340" fill="none" stroke="#E0E0E0" stroke-width="56"/>
  <!-- Green arc -->
  <circle cx="512" cy="512" r="340" fill="none" stroke="url(#green)" stroke-width="56"
    stroke-dasharray="980 2136" stroke-dashoffset="-880" stroke-linecap="round"/>
  <!-- Yellow arc -->
  <circle cx="512" cy="512" r="340" fill="none" stroke="url(#yellow)" stroke-width="56"
    stroke-dasharray="445 2136" stroke-dashoffset="-435" stroke-linecap="round"/>
  <!-- Red arc -->
  <circle cx="512" cy="512" r="340" fill="none" stroke="url(#red)" stroke-width="56"
    stroke-dasharray="356 2136" stroke-linecap="round"/>
  <!-- Clock hand -->
  <line x1="512" y1="512" x2="512" y2="220" stroke="#1565C0" stroke-width="28" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="512" cy="512" r="36" fill="#1565C0"/>
</svg>
